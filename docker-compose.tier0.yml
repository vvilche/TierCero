version: '3.8'

services:
  emqx:
    image: emqx/emqx:latest
    container_name: tier0-broker
    ports:
      - "1883:1883" # MQTT
      - "8083:8083" # WebSockets
      - "18083:18083" # Dashboard (admin:public)
    environment:
      - "EMQX_LISTENER__TCP__EXTERNAL__MAX_CONNECTIONS=1000"

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: tier0-db
    environment:
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"

  nodered:
    image: nodered/node-red:latest
    container_name: tier0-logic
    ports:
      - "1880:1880"
    depends_on:
      - emqx
      - timescaledb

  grafana:
    image: grafana/grafana:latest
    container_name: tier0-viz
    ports:
      - "3000:3000"
    depends_on:
      - timescaledb
